<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Research</title>
<style>
  :root {
    --bg: #eef1f5;
    --card: #ffffff;
    --text: #182230;
    --muted: #667085;
    --line: #d0d5dd;
    --slate: #101828;
    --green: #067647;
    --green-bg: #ecfdf3;
    --amber: #b54708;
    --amber-bg: #fffaeb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: 12px;
  }

  .top {
    margin-bottom: 10px;
  }

  h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1.15;
  }

  .sub {
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
  }

  .panel,
  .result-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
  }

  .panel {
    margin-bottom: 10px;
  }

  .panel-head {
    border-bottom: 1px solid var(--line);
    padding: 11px 12px;
    font-weight: 700;
  }

  .panel-body {
    padding: 12px;
  }

  label {
    display: block;
    margin-bottom: 10px;
  }

  label span {
    display: block;
    margin-bottom: 4px;
    color: #344054;
    font-size: 12px;
    font-weight: 700;
  }

  textarea,
  input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: var(--text);
    font: inherit;
    padding: 10px;
  }

  textarea {
    min-height: 110px;
    resize: vertical;
  }

  .quick {
    display: grid;
    gap: 8px;
    margin: 10px 0;
  }

  .quick button,
  .btn {
    min-height: 40px;
    border: 1px solid var(--slate);
    border-radius: 7px;
    background: #fff;
    color: var(--slate);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 12px;
    font: inherit;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
  }

  .quick button {
    justify-content: flex-start;
    border-color: var(--line);
    text-align: left;
  }

  .quick button.active {
    border-color: var(--slate);
    background: #f2f4f7;
    box-shadow: inset 4px 0 0 var(--slate);
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .btn.primary {
    background: var(--slate);
    color: #fff;
  }

  .secondary-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .status {
    margin-top: 10px;
    border: 1px solid #abefc6;
    border-radius: 7px;
    background: var(--green-bg);
    color: var(--green);
    padding: 9px 10px;
    font-weight: 700;
  }

  .results-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid var(--line);
    padding: 11px 12px;
  }

  .results-title {
    font-weight: 700;
  }

  .results-note {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }

  .pill {
    align-self: flex-start;
    border-radius: 999px;
    background: var(--amber-bg);
    color: var(--amber);
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .cards {
    display: grid;
    gap: 8px;
    padding: 10px;
  }

  .result-card {
    padding: 10px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 7px;
  }

  .product {
    font-weight: 700;
    line-height: 1.25;
  }

  .score {
    min-width: 42px;
    height: 28px;
    border-radius: 6px;
    background: var(--green-bg);
    color: var(--green);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .facts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 7px;
  }

  .fact {
    border: 1px solid #e4e7ec;
    border-radius: 999px;
    padding: 4px 7px;
    color: #344054;
    font-size: 12px;
  }

  .line {
    color: #344054;
    line-height: 1.4;
    margin: 5px 0 0;
  }

  .line strong {
    color: var(--text);
  }

  @media (min-width: 760px) {
    .page {
      padding: 18px;
    }

    .quick {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .actions {
      grid-template-columns: 1fr auto;
      align-items: end;
    }

    .secondary-actions {
      width: 250px;
      margin-top: 0;
    }

    .cards {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
</head>
<body>
<main class="page">
  <header class="top">
    <h1>Trend Research</h1>
    <div class="sub">Ask for a product trend report, then review the best ideas to check.</div>
  </header>

  <section class="panel">
    <div class="panel-head">Generate a Report</div>
    <div class="panel-body">
      <label>
        <span>What do you want to look into?</span>
        <textarea id="request" placeholder="Example: Generate a report of common new trends in Volusia County that might be good to sell online."></textarea>
      </label>

      <div class="quick" aria-label="Quick report choices">
        <button type="button" class="active" data-prompt="Generate a report of common new trends in Volusia County that might be good to sell online.">Top Trends</button>
        <button type="button" data-prompt="Generate a report of products with the most selling potential, low competition, and easy shipping.">Most Potential</button>
        <button type="button" data-prompt="">Custom</button>
      </div>

      <div class="actions">
        <label>
          <span>Area</span>
          <input id="market" type="text" value="Florida, Volusia County, Edgewater, New Smyrna Beach, Oak Hill, Titusville">
        </label>
        <div>
          <button class="btn primary" type="button" id="generate">Generate Report</button>
          <div class="secondary-actions">
            <a class="btn" href="report.html">View Report</a>
            <a class="btn" href="report.pdf">PDF</a>
          </div>
        </div>
      </div>

      <div class="status" id="status">Latest report is shown below.</div>
    </div>
  </section>

  <section class="panel">
    <div class="results-head">
      <div>
        <div class="results-title">Report Results</div>
        <div class="results-note" id="resultsNote">Latest report</div>
      </div>
      <span class="pill" id="resultCount">0 results</span>
    </div>
    <div class="cards" id="cards"></div>
  </section>
</main>

<script>
const fallbackRows = [
  { score: 42, keyword: "beach wagon balloon wheels", sellers: 56, price_low: 37.3, price_high: 899.99, avg_rating: 4.33, pain_points: "Needs review before buying inventory", slogans: ["The Beach Wagon Balloon Wheels Everyone Will Want Next Season."] },
  { score: 42, keyword: "beach wagon wheels for coastal Florida shoppers", sellers: 44, price_low: 39.99, price_high: 415.99, avg_rating: 4.27, pain_points: "Needs review before buying inventory", slogans: ["The Beach Wagon Wheels For Coastal Florida Shoppers Everyone Will Want Next Season."] }
];

const request = document.getElementById("request");
const statusBox = document.getElementById("status");
const resultsNote = document.getElementById("resultsNote");
const resultCount = document.getElementById("resultCount");
const cards = document.getElementById("cards");
const quickButtons = [...document.querySelectorAll(".quick button")];

function price(row) {
  return `$${row.price_low || 0}-$${row.price_high || 0}`;
}

function cleanCheck(text) {
  return text === "Review scan not wired yet" ? "Needs review before buying inventory" : text;
}

function renderRows(rows) {
  cards.innerHTML = "";
  resultCount.textContent = `${rows.length} ${rows.length === 1 ? "result" : "results"}`;
  for (const row of rows.slice(0, 6)) {
    const card = document.createElement("article");
    card.className = "result-card";
    card.innerHTML = `
      <div class="card-top">
        <div class="product">${row.keyword}</div>
        <div class="score">${row.score}</div>
      </div>
      <div class="facts">
        <span class="fact">${row.sellers} sellers</span>
        <span class="fact">${price(row)}</span>
        <span class="fact">${row.avg_rating || "n/a"} rating</span>
      </div>
      <p class="line"><strong>Check before buying:</strong> ${cleanCheck(row.pain_points) || "Needs review before buying inventory"}</p>
      <p class="line"><strong>Ad hook:</strong> ${(row.slogans && row.slogans[0]) || "Needs slogan"}</p>
    `;
    cards.appendChild(card);
  }
}

async function loadResults() {
  try {
    const response = await fetch("results.json", { cache: "no-store" });
    if (!response.ok) throw new Error("Missing results");
    const data = await response.json();
    resultsNote.textContent = data.meta?.generated_on ? `Generated ${data.meta.generated_on}` : "Saved results";
    renderRows(data.rows || fallbackRows);
  } catch {
    renderRows(fallbackRows);
  }
}

quickButtons.forEach(button => {
  button.addEventListener("click", () => {
    quickButtons.forEach(item => item.classList.remove("active"));
    button.classList.add("active");
    request.value = button.dataset.prompt;
    if (!button.dataset.prompt) request.focus();
  });
});

document.getElementById("generate").addEventListener("click", () => {
  const text = request.value.trim();
  statusBox.textContent = text
    ? "Report ready. See results below."
    : "Type what you want to research first.";
});

request.value = quickButtons[0].dataset.prompt;
loadResults();
</script>
</body>
</html>
