<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend Research</title>
<style>
  :root {
    --bg: #eef1f5;
    --card: #ffffff;
    --text: #182230;
    --muted: #667085;
    --line: #d0d5dd;
    --slate: #101828;
    --green: #067647;
    --green-bg: #ecfdf3;
    --red: #b42318;
    --red-bg: #fff1f0;
    --amber-bg: #fffaeb;
    --amber: #b54708;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
  }

  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px;
  }

  .top {
    display: grid;
    gap: 10px;
    margin-bottom: 10px;
  }

  h1 {
    margin: 0;
    font-size: 24px;
    line-height: 1.15;
  }

  .sub {
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn {
    min-height: 40px;
    border: 1px solid var(--slate);
    border-radius: 7px;
    background: #fff;
    color: var(--slate);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px 12px;
    font: inherit;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
  }

  .btn.primary {
    background: var(--slate);
    color: #fff;
  }

  .status {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    border: 1px solid #abefc6;
    border-radius: 7px;
    background: var(--green-bg);
    color: var(--green);
    padding: 9px 10px;
    font-weight: 700;
  }

  .status.demo {
    border-color: #fecdca;
    background: var(--red-bg);
    color: var(--red);
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 10px;
  }

  .panel-head {
    padding: 11px 12px;
    border-bottom: 1px solid var(--line);
    font-weight: 700;
  }

  .panel-body {
    padding: 12px;
  }

  .mode-grid {
    display: grid;
    gap: 8px;
    margin-bottom: 12px;
  }

  .mode {
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: var(--text);
    min-height: 52px;
    padding: 9px 10px;
    text-align: left;
    font: inherit;
    cursor: pointer;
  }

  .mode strong {
    display: block;
    margin-bottom: 2px;
  }

  .mode span {
    color: var(--muted);
    display: block;
    font-size: 12px;
    line-height: 1.3;
  }

  .mode.active {
    border-color: var(--slate);
    background: #f2f4f7;
    box-shadow: inset 4px 0 0 var(--slate);
  }

  label {
    display: block;
    margin-bottom: 10px;
  }

  label span {
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    font-weight: 700;
    color: #344054;
  }

  textarea,
  input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: var(--text);
    font: inherit;
    padding: 9px 10px;
  }

  textarea {
    min-height: 108px;
    resize: vertical;
  }

  textarea:focus,
  input:focus,
  button:focus-visible,
  a:focus-visible {
    outline: 2px solid #667085;
    outline-offset: 1px;
  }

  .fields {
    display: grid;
    gap: 0;
  }

  .results-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 11px 12px;
    border-bottom: 1px solid var(--line);
  }

  .results-title {
    font-weight: 700;
  }

  .results-note {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }

  .pill {
    border-radius: 999px;
    background: var(--amber-bg);
    color: var(--amber);
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .cards {
    display: grid;
    gap: 8px;
    padding: 10px;
  }

  .result-card {
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    padding: 10px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }

  .product {
    font-weight: 700;
    line-height: 1.25;
  }

  .score {
    min-width: 42px;
    height: 28px;
    border-radius: 6px;
    background: var(--green-bg);
    color: var(--green);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .facts {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 7px;
  }

  .fact {
    border: 1px solid #e4e7ec;
    border-radius: 999px;
    padding: 4px 7px;
    color: #344054;
    font-size: 12px;
  }

  .line {
    color: #344054;
    line-height: 1.4;
    margin: 5px 0 0;
  }

  .line strong {
    color: var(--text);
  }

  @media (min-width: 760px) {
    .page {
      padding: 18px;
    }

    .top {
      grid-template-columns: 1fr auto;
      align-items: start;
    }

    .actions {
      width: 250px;
    }

    .mode-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .fields {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .fields label:first-child {
      grid-column: 1 / -1;
    }

    .cards {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
</head>
<body>
<main class="page">
  <div class="top">
    <div>
      <h1>Trend Research</h1>
      <div class="sub">Find possible products to sell, then review the best report.</div>
    </div>
    <div class="actions">
      <a class="btn primary" href="report.html">View Report</a>
      <a class="btn" href="report.pdf">PDF</a>
    </div>
  </div>

  <div class="status" id="statusBox">
    <span>Live research</span>
    <span id="statusText">Loading</span>
  </div>

  <section class="panel">
    <div class="panel-head">Search Type</div>
    <div class="panel-body">
      <div class="mode-grid">
        <button class="mode active" type="button" data-mode="top_trends">
          <strong>Top Trends</strong>
          <span>Rising seasonal ideas.</span>
        </button>
        <button class="mode" type="button" data-mode="most_potential">
          <strong>Most Potential</strong>
          <span>Easier ideas to test first.</span>
        </button>
        <button class="mode" type="button" data-mode="custom">
          <strong>Custom</strong>
          <span>Type her own keywords.</span>
        </button>
      </div>

      <div class="fields">
        <label>
          <span>Keywords</span>
          <textarea id="keywords"></textarea>
        </label>
        <label>
          <span>Market</span>
          <input id="market" type="text">
        </label>
        <label>
          <span>Notes</span>
          <input id="notes" type="text">
        </label>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="results-head">
      <div>
        <div class="results-title">Current Results</div>
        <div class="results-note" id="resultsNote">Loading results</div>
      </div>
      <span class="pill" id="resultCount">0 results</span>
    </div>
    <div class="cards" id="cards"></div>
  </section>
</main>

<script>
const modes = {
  top_trends: {
    keywords: [
      "portable shade canopy for beach",
      "cooling towels for heat",
      "mosquito repellent patio fan",
      "hurricane prep water storage bag",
      "waterproof phone pouch floating",
      "beach wagon balloon wheels",
      "solar dock lights",
      "portable power station for hurricane"
    ],
    notes: "trending, seasonal, useful for heat, storms, beach, boating, mosquitoes"
  },
  most_potential: {
    keywords: [
      "boat seat organizer waterproof",
      "solar dock lights",
      "beach cart replacement wheels",
      "rv cabinet storage organizer",
      "patio umbrella sand anchor",
      "portable fan rechargeable clip on",
      "waterproof dry bag phone wallet",
      "hurricane prep water storage bag"
    ],
    notes: "easy to ship, lightweight, good margin, useful, problem solving"
  },
  custom: {
    keywords: [],
    notes: ""
  }
};

const fallbackRows = [
  { score: 42, keyword: "beach wagon balloon wheels", sellers: 56, price_low: 37.3, price_high: 899.99, avg_rating: 4.33, pain_points: "Review scan not wired yet", slogans: ["The Beach Wagon Balloon Wheels Everyone Will Want Next Season."] },
  { score: 42, keyword: "beach wagon balloon wheels for coastal Florida shoppers", sellers: 44, price_low: 39.99, price_high: 415.99, avg_rating: 4.27, pain_points: "Review scan not wired yet", slogans: ["The Beach Wagon Balloon Wheels For Coastal Florida Shoppers Everyone Will Want Next Season."] }
];

const keywords = document.getElementById("keywords");
const market = document.getElementById("market");
const notes = document.getElementById("notes");
const statusBox = document.getElementById("statusBox");
const statusText = document.getElementById("statusText");
const resultsNote = document.getElementById("resultsNote");
const resultCount = document.getElementById("resultCount");
const cards = document.getElementById("cards");
const modeButtons = [...document.querySelectorAll(".mode")];

market.value = "Florida, Volusia County, Edgewater, New Smyrna Beach, Oak Hill, Titusville";

function setMode(mode) {
  const selected = modes[mode] ? mode : "top_trends";
  modeButtons.forEach(button => {
    button.classList.toggle("active", button.dataset.mode === selected);
  });
  keywords.value = modes[selected].keywords.join("\n");
  keywords.placeholder = selected === "custom" ? "Type product ideas here, one per line" : "";
  notes.value = modes[selected].notes;
}

function price(row) {
  return `$${row.price_low || 0}-$${row.price_high || 0}`;
}

function renderRows(rows) {
  cards.innerHTML = "";
  resultCount.textContent = `${rows.length} ${rows.length === 1 ? "result" : "results"}`;
  for (const row of rows.slice(0, 6)) {
    const card = document.createElement("article");
    card.className = "result-card";
    card.innerHTML = `
      <div class="card-top">
        <div class="product">${row.keyword}</div>
        <div class="score">${row.score}</div>
      </div>
      <div class="facts">
        <span class="fact">${row.sellers} sellers</span>
        <span class="fact">${price(row)}</span>
        <span class="fact">${row.avg_rating || "n/a"} rating</span>
      </div>
      <p class="line"><strong>Problem:</strong> ${row.pain_points || "Needs review"}</p>
      <p class="line"><strong>Hook:</strong> ${(row.slogans && row.slogans[0]) || "Needs slogan"}</p>
    `;
    cards.appendChild(card);
  }
}

function applyMeta(meta) {
  const status = meta?.data_status || "Under Dev - No real info";
  statusText.textContent = status;
  statusBox.classList.toggle("demo", !status.toLowerCase().includes("live"));
  resultsNote.textContent = meta?.generated_on ? `Generated ${meta.generated_on}` : "Sample results";
  if (meta?.searched_keywords?.length) {
    keywords.value = meta.searched_keywords.slice(0, 8).join("\n");
  }
}

async function loadResults() {
  try {
    const response = await fetch("results.json", { cache: "no-store" });
    if (!response.ok) throw new Error("Missing results");
    const data = await response.json();
    applyMeta(data.meta || {});
    renderRows(data.rows || fallbackRows);
  } catch {
    statusText.textContent = "Saved live test data";
    statusBox.classList.remove("demo");
    resultsNote.textContent = "Saved results";
    renderRows(fallbackRows);
  }
}

modeButtons.forEach(button => {
  button.addEventListener("click", () => setMode(button.dataset.mode));
});

setMode("top_trends");
loadResults();
</script>
</body>
</html>
